services:
  - type: web
    name: dams-backend
    runtime: docker
    dockerfilePath: ./Dockerfile
    branch: main
    rootDir: backend
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: DATABASE_USERNAME
        sync: false
      - key: DATABASE_PASSWORD
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: DB_SSL_MODE
        value: require
    healthCheckPath: /actuator/health
    autoDeploy: true
